services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mem0_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API  (matches QDRANT_URL in .env)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: mem0_redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # matches REDIS_URL in .env
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  qdrant_data:
  redis_data:
